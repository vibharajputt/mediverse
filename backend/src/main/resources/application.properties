# Mediverse Backend

## Server Configuration
server.port=${PORT:8083}

## PostgreSQL Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/mediversedb}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:1234567890}

## JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

## JWT
app.jwt.secret=${JWT_SECRET:MediverseSecretKeyForJWTTokenGenerationAndValidation2024VeryLongSecretKey}
app.jwt.expiration=86400000

## Mail Configuration (GoDaddy Workspace SMTP)
spring.mail.host=${MAIL_HOST:smtpout.secureserver.net}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:admin@medastrax.com}
spring.mail.password=${MAIL_PASSWORD:your-email-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.socketFactory.port=465
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

## File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads

## Razorpay Configurations (Test Mode)
razorpay.key.id=${RAZORPAY_KEY_ID:your-razorpay-key}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:your-razorpay-secret}

## Hugging Face AI Configuration
app.huggingface.token=${HUGGINGFACE_API_TOKEN:your-hf-token}

## Twilio SMS Config (set these in environment or edit directly)
twilio.account-sid=${TWILIO_ACCOUNT_SID:your-twilio-sid}
twilio.auth-token=${TWILIO_AUTH_TOKEN:your-twilio-token}
twilio.from-number=${TWILIO_FROM_NUMBER:+1234567890}

# MedGamma Service Configuration
huggingface.api.token=${app.huggingface.token}

